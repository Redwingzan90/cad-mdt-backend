services:
  - type: web
    name: cad-mdt-api
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cad-mdt-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FIVEM_SERVER_KEY
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: PORT
        value: 3001
      - key: HOST
        value: "0.0.0.0"
  - type: postgresql
    name: cad-mdt-db
    plan: free
    databaseName: cad_mdt
    ipAllowList: []
